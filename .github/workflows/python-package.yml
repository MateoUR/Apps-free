name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        # Agregamos @master para resolver el error de "repository not found"
        uses: kivy/buildozer-action@master 
        with:
          save_buildozer_cache: true
          python_version: 3.11

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mi_App_Instalable
          path: bin/*.apk
