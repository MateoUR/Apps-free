name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v4

    - name: Instalar Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Instalar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython==0.29.36

    - name: Instalar dependencias del sistema
      run: |
        sudo apt update
        sudo apt install -y zip unzip git openjdk-17-jdk wget \
        python3-pip autoconf libtool pkg-config zlib1g-dev \
        libncurses-dev cmake \
        libffi-dev libssl-dev

    # NUEVO: Forzar descarga del SDK y aceptar licencias
    - name: Aceptar licencias de Android SDK
      run: |
        # Ejecuta buildozer android update para que descargue el SDK (fallará por licencias, pero los archivos se descargan igual)
        buildozer android update || true
        # Busca el sdkmanager que Buildozer instaló
        SDKMANAGER=$(find /home/runner/.buildozer/android/platform/android-sdk -name sdkmanager | head -1)
        if [ -n "$SDKMANAGER" ]; then
          echo "Aceptando licencias..."
          yes | $SDKMANAGER --licenses
        else
          echo "No se encontró sdkmanager; verifica la instalación del SDK"
          exit 1
        fi

    - name: Compilar APK
      run: |
        buildozer android debug
