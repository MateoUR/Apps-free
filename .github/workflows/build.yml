name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v4

    - name: Instalar Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Instalar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython==0.29.36

    - name: Instalar dependencias del sistema
      run: |
        sudo apt update
        sudo apt install -y zip unzip git openjdk-17-jdk wget \
        python3-pip autoconf libtool pkg-config zlib1g-dev \
        libncurses-dev cmake \
        libffi-dev libssl-dev

    # ➕ Paso nuevo: preparar Android SDK con licencias aceptadas
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      with:
        api-level: 34
        build-tools: 34.0.0

    # ➕ Compilación usando el SDK ya instalado
    - name: Compilar APK
      env:
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk   # ruta donde setup-android lo instala
      run: |
        buildozer android debug
