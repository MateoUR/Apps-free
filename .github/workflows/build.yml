name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Código fuente ────────────────────────────────────
      - name: Descargar repositorio
        uses: actions/checkout@v4

      # ── 2. Java ─────────────────────────────────────────────
      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Python ───────────────────────────────────────────
      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 4. Dependencias del sistema ─────────────────────────
      - name: Instalar dependencias del sistema
        run: |
          sudo apt update
          sudo apt install -y \
            zip unzip git wget \
            openjdk-17-jdk \
            python3-pip \
            autoconf libtool libtool-bin automake autopoint \
            pkg-config \
            zlib1g-dev libncurses-dev cmake \
            libffi-dev libssl-dev

      # ── 5. Dependencias Python ──────────────────────────────
      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install buildozer

      # ── 6. Android SDK ──────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Aceptar licencias Android
        run: yes | sdkmanager --licenses

      - name: Instalar Build Tools
        run: |
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-34"
          sdkmanager "build-tools;34.0.0"

      # ── 7. Verificar estructura del proyecto ────────────────
      - name: Verificar archivos requeridos
        run: |
          echo "=== Archivos en raíz ==="
          ls -la
          echo ""
          echo "=== Verificando archivos críticos ==="
          for f in main.py service.py utils.py buildozer.spec \
                   bg_menu.png bg_medications.png bg_appointments.png \
                   sound_button.mp3 sound_notification.mp3; do
            if [ -f "$f" ]; then
              echo " $f"
            else
              echo " $f — FALTA"
            fi
          done
          echo ""
          echo "=== Verificando BootReceiver.java ==="
          if [ -f "src/com/recordatorios/BootReceiver.java" ]; then
            echo " src/com/recordatorios/BootReceiver.java"
          else
            echo " src/com/recordatorios/BootReceiver.java — FALTA"
          fi

      # ── 8. Compilar APK ─────────────────────────────────────
      - name: Compilar APK
        env:
          ANDROIDSDK: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: buildozer android debug

      # ── 9. Subir APK como artefacto ────────────────────────
      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: app-recordatorios-debug
          path: bin/*.apk
          retention-days: 30
